version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Minh020099#1234 # Hãy đổi lại mật khẩu của bạn nếu muốn
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql

  api:
    build: .
    container_name: ktx_api
    restart: always
    ports:
      - "5294:5294"
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=QuanLyKTX;User Id=sa;Password=Minh020099#1234;TrustServerCertificate=True;Encrypt=False;
      - ASPNETCORE_URLS=http://+:5294

# Khai báo Volume để Docker tự quản lý dữ liệu SQL
volumes:
  mssql_data:
